version: '3.8'

services:
  db:
    image: postgres
    container_name: mydb
    environment:
      POSTGRES_PASSWORD: secret123
    networks:
      - mynetwork

  app:
    build: .
    container_name: saikat-app
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - mynetwork

networks:
  mynetwork:
